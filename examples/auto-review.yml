name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run AutoAgent-TW Review
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          headless_args: "--action review --strict"
