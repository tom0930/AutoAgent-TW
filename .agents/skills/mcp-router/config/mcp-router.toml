[general]
listen_stdio = true
log_level = "info"
report_metrics = true

[strategy]
default = "compact"
builder = "compact"
research = "ultra-compact"
qa = "summary"
guardian = "verbose"

[routing.gitkraken]
tool_prefix = ["git_log_or_diff", "git_blame", "git_status"]
rtk_mode = "git"
strategy = "compact"

[routing.filesystem]
tool_prefix = ["read_file", "list_dir", "glob", "view_file"]
rtk_mode = "fs"
strategy = "compact"
max_lines = 150

[routing.browser]
tool_prefix = ["fetch_page", "web_search", "read_url_content", "read_browser_page"]
rtk_mode = "browser"
strategy = "summary"

[routing.context7]
tool_prefix = ["mcp__context7__query-docs", "mcp__context7__search"]
rtk_mode = "docs"
strategy = "ultra-compact"
max_lines = 800

[custom.vivado]
exclude = [".cache", ".xpr", ".jou", "webtalk", "generated"]
keep = ["ERROR", "CRITICAL WARNING", "Timing Violation", "AXI", "UDP", "IPC"]

[custom.debug]
keep_patterns = ["UDP packet", "AXI transaction", "checksum error", "timeout"]
max_tokens_per_response = 1200
