<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoAgent-TW Status Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #c9d1d9; }
        .glass { background: rgba(22, 27, 34, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .pulse-green { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); } 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); } }
    </style>
</head>
<body class="p-6 md:pt-20">
    <!-- Top Fixed Banner -->
    <div class="fixed top-0 left-0 right-0 glass z-50 px-6 py-3 flex items-center justify-between border-b border-gray-800">
        <div class="flex items-center gap-3">
            <div id="status-dot" class="p-2 bg-green-500 rounded-full pulse-green"></div>
            <div>
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest">目前執行中</p>
                <h1 id="current-task" class="text-sm font-bold text-white">初始化中...</h1>
            </div>
        </div>
        <div class="hidden md:flex flex-col items-end">
            <p class="text-xs font-semibold text-gray-400 uppercase">進度</p>
            <p id="progress-text" class="text-sm font-bold text-blue-400">Phase 0/0</p>
        </div>
    </div>

    <div class="max-w-4xl mx-auto space-y-6">
        <!-- Dashboard Header -->
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i data-lucide="layers" class="w-8 h-8 text-blue-400"></i>
                <h2 class="text-2xl font-bold text-white">AutoAgent-TW</h2>
            </div>
            <div id="timestamp" class="text-xs text-gray-500">最後更新: 剛才</div>
        </div>

        <!-- Next Goal Card -->
        <div class="glass rounded-2xl p-6 transition-all hover:border-blue-500/50">
            <div class="flex items-center gap-3 mb-4">
                <div class="p-2 bg-blue-500/20 rounded-lg text-blue-400">
                    <i data-lucide="target" class="w-5 h-5"></i>
                </div>
                <h3 class="text-lg font-semibold text-white">下一步目標</h3>
            </div>
            <p id="next-goal" class="text-gray-300 text-lg">正在等待 AI 核心指令...</p>
        </div>

        <!-- Progress Bar -->
        <div class="glass rounded-2xl p-6">
            <div class="flex justify-between items-center mb-4">
                 <h3 class="text-sm font-semibold text-gray-400 uppercase">階段進度</h3>
                 <span id="percent-text" class="text-blue-400 font-bold">0%</span>
            </div>
            <div class="w-full bg-gray-800 rounded-full h-3">
                <div id="progress-bar" class="bg-blue-600 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        async function updateStatus() {
            try {
                // Fetch status from the central agent-state folder
                const response = await fetch('../../../.agent-state/status_state.json');
                if (!response.ok) throw new Error('Status file not found');
                
                const data = await response.json();
                
                // Update DOM elements
                document.getElementById('current-task').innerText = data.current_task || 'Idle';
                document.getElementById('next-goal').innerText = data.next_goal || 'Waiting for tasks...';
                document.getElementById('progress-text').innerText = `Phase ${data.phase_num}/${data.total_phases}`;
                
                const percent = Math.round((data.phase_num / data.total_phases) * 100);
                document.getElementById('percent-text').innerText = `${percent}%`;
                document.getElementById('progress-bar').style.width = `${percent}%`;
                
                const lastUpdate = new Date(data.timestamp);
                document.getElementById('timestamp').innerText = `最後更新: ${lastUpdate.toLocaleTimeString()}`;
                
                // Status mapping
                const dot = document.getElementById('status-dot');
                dot.className = 'p-2 rounded-full ' + (
                    data.status === 'running' ? 'bg-green-500 pulse-green' :
                    data.status === 'fail' ? 'bg-red-500' :
                    data.status === 'done' ? 'bg-blue-500' : 'bg-gray-500'
                );
                
            } catch (err) {
                console.error("Failed to update status:", err);
            }
        }

        // Poll every 2 seconds
        setInterval(updateStatus, 2000);
        updateStatus(); // Initial call
    </script>
</body>
</html>
