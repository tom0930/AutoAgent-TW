<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoAgent-TW v1.6.0 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        :root {
            --bg-deep: #05070a;
            --glass-bg: rgba(13, 17, 23, 0.8);
            --border-glow: rgba(56, 189, 248, 0.2);
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top left, #0d1117, #05070a);
            color: #e6edf3; 
            min-height: 100vh;
        }
        .glass { 
            background: var(--glass-bg); 
            backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .pulse-green { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); } 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); } }
        
        .tab-btn.active { 
            background: rgba(59, 130, 246, 0.1); 
            color: #60a5fa; 
            border-bottom: 2px solid #3b82f6; 
        }
        
        /* Mermaid Specific Overrides */
        .node.running { animation: pulse-node 2s infinite; }
        @keyframes pulse-node { 50% { opacity: 0.7; transform: scale(1.02); } }
        .mermaid { background: transparent; display: flex; justify-content: center; transform: scale(0.9); transition: all 0.3s ease; }
        .mermaid .label { font-weight: 600; color: #fff !important; }

        #log-container::-webkit-scrollbar { width: 4px; }
        #log-container::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body class="p-4 md:pt-16">
    <!-- Top Fixed Banner -->
    <div class="fixed top-0 left-0 right-0 glass z-50 px-6 py-2 flex items-center justify-between border-b border-gray-800">
        <div class="flex items-center gap-3">
            <div id="status-dot" class="p-2 bg-green-500 rounded-full pulse-green"></div>
            <div>
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest flex items-center gap-2">
                    System Active <span id="v-tag" class="ml-2 text-blue-500 font-mono">v1.6.0</span>
                    <span id="repair-tag" class="hidden px-2 py-0.5 bg-yellow-500/20 text-yellow-500 rounded-full">Repair #1</span>
                </p>
                <h1 id="current-task" class="text-xs font-bold text-white uppercase truncate max-w-[200px]">Idle</h1>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div class="hidden md:flex flex-col items-end">
                <p class="text-[10px] font-bold text-gray-500 uppercase">Phase Progress</p>
                <p id="progress-text" class="text-xs font-bold text-blue-400">0/0</p>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto space-y-4">
        <!-- Main Info Layer -->
        <div class="glass rounded-xl p-4 flex items-start gap-4">
            <div class="p-3 bg-blue-500/10 rounded-xl text-blue-400 shrink-0">
                <i data-lucide="target" class="w-6 h-6"></i>
            </div>
            <div class="space-y-1">
                <h3 class="text-sm font-bold text-blue-400 uppercase tracking-tighter">Current Objective</h3>
                <p id="next-goal" class="text-white text-lg font-medium leading-tight">Waiting for tasks...</p>
            </div>
        </div>

        <!-- Tabs Navigation -->
        <div class="flex border-b border-gray-800 gap-2 overflow-x-auto no-scrollbar">
            <button onclick="showTab('flow')" class="tab-btn px-4 py-2 text-sm font-semibold transition-all active" id="tab-flow">Execution Flow</button>
            <button onclick="showTab('logs')" class="tab-btn px-4 py-2 text-sm font-semibold transition-all" id="tab-logs">Live Logs</button>
            <button onclick="showTab('scheduler')" class="tab-btn px-4 py-2 text-sm font-semibold transition-all" id="tab-scheduler">Scheduler & Hooks</button>
        </div>

        <!-- Tab Content: Flow -->
        <div id="content-flow" class="tab-content fade-in">
            <div class="glass rounded-xl p-6 min-h-[350px]">
                <div id="mermaid-container" class="mermaid">Loading execution map...</div>
            </div>
        </div>

        <!-- Tab Content: Logs -->
        <div id="content-logs" class="tab-content hidden fade-in">
            <div class="glass rounded-xl p-4">
                <div id="log-container" class="bg-black/60 rounded-lg p-3 font-mono text-xs space-y-1 h-[400px] overflow-y-auto border border-gray-800">
                    <div class="text-gray-600">Waiting for log stream...</div>
                </div>
            </div>
        </div>

        <!-- Tab Content: Scheduler -->
        <div id="content-scheduler" class="tab-content hidden fade-in space-y-4">
            <div class="glass rounded-xl p-6">
                <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                    <i data-lucide="clock" class="w-5 h-5 text-purple-400"></i>
                    Scheduled Tasks
                </h3>
                <div id="scheduler-list" class="space-y-3">
                    <p class="text-sm text-gray-500 italic">No scheduled tasks active.</p>
                </div>
            </div>
            <div class="glass rounded-xl p-6">
                <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                    <i data-lucide="zap" class="w-5 h-5 text-yellow-400"></i>
                    Event Hooks
                </h3>
                <div id="hooks-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <p class="text-sm text-gray-500 italic">No hooks configured.</p>
                </div>
            </div>
        </div>

        <!-- Overall Progress -->
        <div class="glass rounded-xl p-4">
            <div class="flex justify-between items-center mb-2">
                 <span class="text-[10px] font-bold text-gray-500 uppercase">System Integrity</span>
                 <span id="percent-text" class="text-xs font-mono text-blue-400">0%</span>
            </div>
            <div class="w-full bg-gray-800/50 rounded-full h-1.5 overflow-hidden">
                <div id="progress-bar" class="bg-blue-500 h-full transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <script id="status-script"></script>
    <script>
        lucide.createIcons();
        mermaid.initialize({ startOnLoad: false, theme: 'dark', flowchart: { htmlLabels: true } });
        
        let lastMermaidCode = "";
        let lastTimestamp = Date.now();

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`content-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('active');
        }

        async function updateStatus() {
            const oldScript = document.getElementById('status-script');
            const newScript = document.createElement('script');
            newScript.id = 'status-script';
            newScript.src = '../../../../.agent-state/status_state.js?v=' + Date.now();
            
            newScript.onload = async () => {
                const data = window.AA_STATUS;
                if (!data) return;

                lastTimestamp = new Date(data.timestamp).getTime();
                document.getElementById('current-task').innerText = data.current_task;
                document.getElementById('next-goal').innerText = data.next_goal;
                document.getElementById('progress-text').innerText = `${data.phase_num}/${data.total_phases}`;
                
                const pct = Math.round((data.phase_num / data.total_phases) * 100);
                document.getElementById('percent-text').innerText = `${pct}%`;
                document.getElementById('progress-bar').style.width = `${pct}%`;

                // Log Sync
                const logBox = document.getElementById('log-container');
                if (data.logs.length > 0) {
                    logBox.innerHTML = data.logs.map(log => `
                        <div class="flex gap-2">
                            <span class="text-blue-500 opacity-50">›</span>
                            <span class="text-gray-300">${log}</span>
                        </div>
                    `).join('');
                }

                // Mermaid Sync
                if (data.mermaid_code && data.mermaid_code !== lastMermaidCode) {
                    lastMermaidCode = data.mermaid_code;
                    const { svg } = await mermaid.render('mermaid-svg', data.mermaid_code);
                    document.getElementById('mermaid-container').innerHTML = svg;
                }

                // Scheduler Sync
                if (data.scheduled_tasks) {
                    const sList = document.getElementById('scheduler-list');
                    if (data.scheduled_tasks.length > 0) {
                        sList.innerHTML = data.scheduled_tasks.map(t => {
                            const statusColor = t.last_status === 'success' ? 'text-green-400' : (t.last_status === 'fail' ? 'text-red-400' : 'text-gray-500');
                            return `
                                <div class="p-3 bg-white/5 rounded-lg border border-white/5 flex justify-between items-center">
                                    <div class="flex-1">
                                        <div class="flex items-center gap-2">
                                            <p class="font-bold text-sm text-white">${t.name}</p>
                                            <span class="text-[10px] px-1.5 py-0.5 bg-purple-500/10 text-purple-400 rounded border border-purple-500/20">${t.trigger_type}</span>
                                        </div>
                                        <p class="text-[10px] text-gray-500 font-mono mt-1">${t.command}</p>
                                        <div class="flex items-center gap-3 mt-2">
                                            <p class="text-[10px] text-gray-400">Last Run: <span class="text-gray-300">${t.last_run || 'Never'}</span></p>
                                            <p class="text-[10px] font-bold ${statusColor}">Status: ${t.last_status || 'Idle'}</p>
                                        </div>
                                    </div>
                                    <div class="p-2 bg-gray-800/50 rounded-full">
                                         <i data-lucide="${t.last_status === 'success' ? 'check-circle' : (t.last_status === 'fail' ? 'x-circle' : 'activity')}" class="w-4 h-4 ${statusColor}"></i>
                                    </div>
                                </div>
                            `;
                        }).join('');
                        lucide.createIcons(); // Re-render logic for new icons
                    }
                }

                // Hooks Sync
                if (data.hooks && data.hooks.on) {
                    const hList = document.getElementById('hooks-list');
                    const hookKeys = Object.keys(data.hooks.on);
                    if (hookKeys.length > 0) {
                        hList.innerHTML = hookKeys.map(k => `
                            <div class="p-3 bg-white/5 rounded-lg border border-white/5 space-y-1">
                                <p class="text-[10px] uppercase font-bold text-yellow-500">${k}</p>
                                <p class="text-xs text-gray-400">${data.hooks.on[k].length} actions registered</p>
                            </div>
                        `).join('');
                    }
                }
            };
            oldScript.parentNode.replaceChild(newScript, oldScript);
        }

        setInterval(updateStatus, 3000);
        updateStatus();
    </script>
</body>
</html>
