[general]
fallback_on_error = true
verbose_flag = "--raw"

[git]
status = "short"
log = "oneline"
diff = "compact"          # --stat + summary
show = "compact"

[custom.vivado_diff]
# FPGA 專案常見大型 diff 優化
exclude = [".* Vivado generated .*", ".*.xpr", ".*.cache.*", ".*timing summary.*"]
keep_patterns = ["CRITICAL WARNING:", "ERROR:", "AXI", "UDP", "IPC"]
mode = "grep-priority"

[custom.mfc_cpp]
exclude = [".*is up to date.*", ".*Skipping.*", ".*0 error\\(s\\).*"]
keep = ["error C", "warning C"]

[custom.debug]
keep_patterns = ["UDP packet", "AXI transaction", "checksum", "timeout"]
