[general]
fallback_on_error = true
verbose_flag = "--raw"

[custom.vivado]
patterns = ["ERROR:", "CRITICAL WARNING:", "Implementation failed", "Timing Violation"]
mode = "grep-priority"
keep_lines_before = 5
keep_lines_after = 10

[custom.vitis]
exclude = [".*INFO:.*", ".*Progress:.*%", ".*Routing resources.*"]

[custom.mfc_cpp]
exclude = [".*is up to date.*", ".*Skipping project.*", ".*0 error\(s\).*"]
keep = ["error C", "warning C", "fatal error"]

[custom.make]
summary_only = true

[custom.debug]
# UDP/IPC 相關 (VMatIrrKitPacking 專屬)
keep_patterns = ["UDP packet", "IPC send", "AXI transaction", "timeout", "checksum error"]
