# importlinter.ini — Architecture Guardrails for AutoAgent-TW
# Enforces dependency direction: lower layers cannot import upper layers.
# Reference: Harness Engineering (OpenAI) — "strong, typed layers + CI enforcement"
#
# Usage:
#   pip install import-linter
#   lint-imports
#
# Integration:
#   Add to aa-qa or CI pipeline for automatic architecture drift detection.

[importlinter]
root_packages =
    src
include_external_packages = True

[importlinter:contract:core-layering]
name = Core module layering
type = layers
layers =
    src.core.security
    src.core.orchestration
    src.core.harness_gateway
    src.core.session_manager
    src.core.mcp
    src.core.rva
    src.core.memory
    src.core.cron
    src.core.plugin
    src.core.skill

[importlinter:contract:no-scripts-in-core]
name = Core must not import scripts
type = forbidden
source_modules =
    src.core
forbidden_modules =
    scripts

[importlinter:contract:no-agents-in-core]
name = Core must not import agent skills
type = forbidden
source_modules =
    src.core
forbidden_modules =
    _agents
