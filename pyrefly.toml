project-includes = [
    "src/**/*.py",
    "tests/**/*.py",
]

project-excludes = [
    "venv",
    ".venv",
    "scratch",
    "_agents",
    ".planning",
    "artifacts",
]

[rules]
# Suppress missing imports broadly for now to unblock commit workflow
"missing-import" = { level = "warning" }

[python]
# Force project root as the top-level import search path
import-roots = ["."]
extra-sys-paths = ["."]


