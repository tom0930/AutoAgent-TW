project-includes = [
    "src/**/*.py",
    "tests/**/*.py",
]

project-excludes = [
    "venv",
    ".venv",
    "scratch",
    "_agents",
    ".planning",
    "artifacts",
]

[errors]
missing-import = false

[ignore-modules]
"pytest" = "any"
"src" = "any"

[python]
# Force project root as the top-level import search path
import-roots = ["."]
extra-sys-paths = ["."]
